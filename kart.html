<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Shopping Cart - LIRA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .cart-container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
        }
        
        .page-header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.5s ease;
        }
        
        .page-header h1 {
            font-size: 42px;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .cart-grid {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 30px;
        }
        
        /* Cart Items */
        .cart-items {
            background: white;
            border-radius: 30px;
            padding: 30px;
            box-shadow: var(--shadow);
        }
        
        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .cart-title {
            font-size: 24px;
            font-weight: 700;
        }
        
        .cart-count {
            background: #f0f0f0;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 14px;
        }
        
        .cart-item {
            display: flex;
            gap: 20px;
            padding: 20px;
            border-bottom: 1px solid #f0f0f0;
            transition: all 0.3s ease;
            animation: fadeIn 0.5s ease;
        }
        
        .cart-item:hover {
            background: #f8f9fa;
            transform: translateX(10px);
            border-radius: 15px;
        }
        
        .item-image {
            width: 100px;
            height: 100px;
            border-radius: 15px;
            object-fit: cover;
            border: 2px solid #f0f0f0;
        }
        
        .item-details {
            flex: 1;
        }
        
        .item-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .item-category {
            font-size: 14px;
            color: var(--gray);
            margin-bottom: 10px;
        }
        
        .item-meta {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }
        
        .item-meta span {
            font-size: 12px;
            background: #f0f0f0;
            padding: 3px 10px;
            border-radius: 50px;
        }
        
        .item-price {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
        }
        
        .item-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .quantity-control {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f0f0f0;
            border-radius: 30px;
            padding: 5px;
        }
        
        .qty-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: none;
            background: white;
            color: var(--dark);
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        
        .qty-btn:hover {
            background: var(--primary);
            color: white;
            transform: scale(1.1);
        }
        
        .qty-value {
            font-weight: 600;
            min-width: 30px;
            text-align: center;
        }
        
        .remove-btn {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s ease;
        }
        
        .remove-btn:hover {
            transform: scale(1.2);
            color: #ff1744;
        }
        
        .item-total {
            font-size: 20px;
            font-weight: 700;
            color: var(--success);
            min-width: 100px;
            text-align: right;
        }
        
        /* Cart Summary */
        .cart-summary {
            background: white;
            border-radius: 30px;
            padding: 30px;
            box-shadow: var(--shadow);
            position: sticky;
            top: 100px;
            height: fit-content;
        }
        
        .summary-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 30px;
        }
        
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin: 15px 0;
            padding: 10px 0;
            border-bottom: 1px dashed #f0f0f0;
        }
        
        .summary-total {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
            padding: 20px 0;
            border-top: 2px solid #f0f0f0;
            font-size: 24px;
            font-weight: 700;
        }
        
        .total-amount {
            color: var(--primary);
        }
        
        .promo-code {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        
        .promo-input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            font-size: 14px;
        }
        
        .promo-input:focus {
            border-color: var(--primary);
            outline: none;
        }
        
        .apply-btn {
            padding: 12px 25px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .apply-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }
        
        .checkout-btn {
            width: 100%;
            padding: 18px;
            background: var(--gradient-1);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 20px 0;
            position: relative;
            overflow: hidden;
        }
        
        .checkout-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.5s ease, height 0.5s ease;
        }
        
        .checkout-btn:hover::before {
            width: 300px;
            height: 300px;
        }
        
        .secure-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: var(--success);
            font-size: 14px;
        }
        
        .empty-cart {
            text-align: center;
            padding: 60px;
            color: var(--gray);
        }
        
        .empty-cart i {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.3;
        }
        
        .empty-cart h3 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .empty-cart p {
            margin-bottom: 20px;
        }
        
        .continue-shopping {
            display: inline-block;
            padding: 12px 30px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s ease;
        }
        
        .continue-shopping:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3);
        }
        
        /* Address Modal */
        .address-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        
        .address-modal.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }
        
        .modal-content {
            background: white;
            border-radius: 30px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }
        
        .address-form {
            margin: 20px 0;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .saved-addresses {
            margin: 20px 0;
        }
        
        .address-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        
        .address-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }
        
        .address-card.selected {
            border-color: var(--primary);
            background: #f0e6ff;
        }
        
        @media (max-width: 992px) {
            .cart-grid {
                grid-template-columns: 1fr;
            }
            
            .cart-summary {
                position: static;
            }
        }
        
        @media (max-width: 768px) {
            .cart-item {
                flex-direction: column;
                position: relative;
            }
            
            .item-image {
                width: 100%;
                height: 200px;
            }
            
            .item-actions {
                flex-wrap: wrap;
            }
            
            .item-total {
                text-align: left;
            }
            
            .remove-btn {
                position: absolute;
                top: 20px;
                right: 20px;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="animated-bg">
        <span></span><span></span><span></span><span></span><span></span>
    </div>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="/" class="logo">LIRA</a>
            <div class="mobile-menu-btn">
                <i class="fas fa-bars"></i>
            </div>
            <div class="nav-menu">
                <a href="/" class="nav-link">Home</a>
                <a href="/products" class="nav-link">Products</a>
                <a href="/kart" class="nav-link active">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-badge" id="cartCount">0</span>
                </a>
                <a href="/dashboard" class="nav-link">Dashboard</a>
                <div class="nav-link" onclick="logout()" style="cursor: pointer;">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </div>
            </div>
        </div>
    </nav>

    <div class="cart-container">
        <!-- Page Header -->
        <div class="page-header">
            <h1>Shopping Cart</h1>
            <p>Review your items and complete your purchase</p>
        </div>

        <!-- Cart Grid -->
        <div class="cart-grid">
            <!-- Cart Items -->
            <div class="cart-items">
                <div class="cart-header">
                    <div class="cart-title">Your Cart</div>
                    <div class="cart-count" id="itemCount">0 items</div>
                </div>
                
                <div id="cartItemsList">
                    <!-- Cart items will be loaded here -->
                    <div class="loader"></div>
                </div>
            </div>
            
            <!-- Cart Summary -->
            <div class="cart-summary">
                <div class="summary-title">Order Summary</div>
                
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="subtotal">₹0</span>
                </div>
                
                <div class="summary-row">
                    <span>Shipping</span>
                    <span id="shipping">₹0</span>
                </div>
                
                <div class="summary-row">
                    <span>Tax (GST 5%)</span>
                    <span id="tax">₹0</span>
                </div>
                
                <div class="summary-total">
                    <span>Total</span>
                    <span class="total-amount" id="total">₹0</span>
                </div>
                
                <div class="promo-code">
                    <input type="text" class="promo-input" id="promoCode" placeholder="Promo code">
                    <button class="apply-btn" onclick="applyPromo()">Apply</button>
                </div>
                
                <button class="checkout-btn" onclick="checkout()" id="checkoutBtn">
                    Proceed to Checkout
                </button>
                
                <div class="secure-badge">
                    <i class="fas fa-lock"></i>
                    <span>Secure Checkout</span>
                    <i class="fas fa-shield-alt"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- Address Modal -->
    <div class="address-modal" id="addressModal">
        <div class="modal-content">
            <h2 style="margin-bottom: 20px;">Select Delivery Address</h2>
            
            <div class="saved-addresses" id="savedAddresses">
                <!-- Saved addresses will be loaded here -->
            </div>
            
            <h3 style="margin: 20px 0;">Add New Address</h3>
            
            <form class="address-form" id="addressForm">
                <div class="form-group">
                    <label class="form-label">Street Address</label>
                    <input type="text" class="form-control" id="street" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">City</label>
                        <input type="text" class="form-control" id="city" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">State</label>
                        <input type="text" class="form-control" id="state" required>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Pincode</label>
                        <input type="text" class="form-control" id="pincode" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Phone</label>
                        <input type="tel" class="form-control" id="phone" required>
                    </div>
                </div>
            </form>
            
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn btn-outline" style="flex: 1;" onclick="closeAddressModal()">Cancel</button>
                <button class="btn btn-primary" style="flex: 1;" onclick="confirmAddress()">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        let cart = [];
        let userData = null;
        
        // Check authentication
        async function checkAuth() {
            const session = await fetch('/api/session').then(r => r.json());
            if (!session.loggedIn) {
                window.location.href = '/login';
                return false;
            }
            return true;
        }
        
        // Load cart
        async function loadCart() {
            try {
                const response = await fetch('/api/cart');
                const data = await response.json();
                cart = data.cart || [];
                
                updateCartDisplay();
                
            } catch (error) {
                console.error('Error loading cart:', error);
            }
        }
        
        // Update cart display
        function updateCartDisplay() {
            const container = document.getElementById('cartItemsList');
            const itemCount = document.getElementById('itemCount');
            const checkoutBtn = document.getElementById('checkoutBtn');
            
            if (!cart || cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <i class="fas fa-shopping-cart"></i>
                        <h3>Your cart is empty</h3>
                        <p>Looks like you haven't added anything yet</p>
                        <a href="/" class="continue-shopping">Continue Shopping</a>
                    </div>
                `;
                itemCount.textContent = '0 items';
                checkoutBtn.disabled = true;
                checkoutBtn.style.opacity = '0.5';
                
                // Update summary
                updateSummary(0);
                return;
            }
            
            checkoutBtn.disabled = false;
            checkoutBtn.style.opacity = '1';
            
            let totalItems = 0;
            let subtotal = 0;
            
            container.innerHTML = '';
            cart.forEach((item, index) => {
                totalItems += item.quantity;
                subtotal += item.price * item.quantity;
                
                const itemDiv = document.createElement('div');
                itemDiv.className = 'cart-item';
                itemDiv.innerHTML = `
                    <img src="${item.image || 'https://via.placeholder.com/100'}" alt="${item.name}" class="item-image">
                    <div class="item-details">
                        <div class="item-name">${item.name}</div>
                        <div class="item-category">${item.category || 'Product'}</div>
                        <div class="item-meta">
                            <span>BV: ${item.bv || 0}</span>
                            <span>DP: ${item.dp || 0}</span>
                            ${item.making ? `<span>Making: ${item.making}%</span>` : ''}
                        </div>
                        <div class="item-price">₹${item.price}</div>
                    </div>
                    <div class="item-actions">
                        <div class="quantity-control">
                            <button class="qty-btn" onclick="updateQuantity('${item.productId}', -1)">-</button>
                            <span class="qty-value">${item.quantity}</span>
                            <button class="qty-btn" onclick="updateQuantity('${item.productId}', 1)">+</button>
                        </div>
                        <button class="remove-btn" onclick="removeItem('${item.productId}')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                    <div class="item-total">
                        ₹${(item.price * item.quantity).toLocaleString()}
                    </div>
                `;
                container.appendChild(itemDiv);
            });
            
            itemCount.textContent = `${totalItems} item${totalItems !== 1 ? 's' : ''}`;
            updateSummary(subtotal);
        }
        
        // Update summary
        function updateSummary(subtotal) {
            const shipping = subtotal > 0 ? 50 : 0;
            const tax = subtotal * 0.05;
            const total = subtotal + shipping + tax;
            
            document.getElementById('subtotal').textContent = `₹${subtotal.toLocaleString()}`;
            document.getElementById('shipping').textContent = `₹${shipping}`;
            document.getElementById('tax').textContent = `₹${tax.toLocaleString()}`;
            document.getElementById('total').textContent = `₹${total.toLocaleString()}`;
            
            // Update cart count in navbar
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartCount').textContent = totalItems;
        }
        
        // Update quantity
        async function updateQuantity(productId, change) {
            const item = cart.find(i => i.productId === productId);
            if (!item) return;
            
            const newQuantity = item.quantity + change;
            
            if (newQuantity < 1) {
                removeItem(productId);
                return;
            }
            
            try {
                const response = await fetch('/api/cart/update', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ productId, quantity: newQuantity })
                });
                
                const data = await response.json();
                if (data.success) {
                    cart = data.cart;
                    updateCartDisplay();
                }
            } catch (error) {
                console.error('Error updating quantity:', error);
            }
        }
        
        // Remove item
        async function removeItem(productId) {
            if (!confirm('Remove this item from cart?')) return;
            
            try {
                const response = await fetch(`/api/cart/remove/${productId}`, {
                    method: 'DELETE'
                });
                
                const data = await response.json();
                if (data.success) {
                    cart = data.cart;
                    updateCartDisplay();
                }
            } catch (error) {
                console.error('Error removing item:', error);
            }
        }
        
        // Apply promo code
        function applyPromo() {
            const promo = document.getElementById('promoCode').value;
            alert('Promo code feature coming soon!');
        }
        
        // Checkout
        function checkout() {
            if (!cart || cart.length === 0) {
                alert('Your cart is empty');
                return;
            }
            
            // Show address modal
            loadAddresses();
            document.getElementById('addressModal').classList.add('active');
        }
        
        // Load addresses
        async function loadAddresses() {
            try {
                const response = await fetch('/api/profile');
                const user = await response.json();
                
                const container = document.getElementById('savedAddresses');
                
                if (user.address && user.address.street) {
                    container.innerHTML = `
                        <div class="address-card selected" onclick="selectAddress(this)">
                            <p><strong>${user.address.street}</strong></p>
                            <p>${user.address.city}, ${user.address.state} - ${user.address.pincode}</p>
                            <p>Phone: ${user.mobile}</p>
                        </div>
                    `;
                    
                    // Pre-fill form
                    document.getElementById('street').value = user.address.street || '';
                    document.getElementById('city').value = user.address.city || '';
                    document.getElementById('state').value = user.address.state || '';
                    document.getElementById('pincode').value = user.address.pincode || '';
                    document.getElementById('phone').value = user.mobile || '';
                } else {
                    container.innerHTML = '<p>No saved addresses. Please add one below.</p>';
                }
            } catch (error) {
                console.error('Error loading addresses:', error);
            }
        }
        
        // Select address
        function selectAddress(element) {
            document.querySelectorAll('.address-card').forEach(card => {
                card.classList.remove('selected');
            });
            element.classList.add('selected');
        }
        
        // Confirm address and proceed
        async function confirmAddress() {
            const address = {
                street: document.getElementById('street').value,
                city: document.getElementById('city').value,
                state: document.getElementById('state').value,
                pincode: document.getElementById('pincode').value,
                phone: document.getElementById('phone').value
            };
            
            if (!address.street || !address.city || !address.state || !address.pincode) {
                alert('Please fill all address fields');
                return;
            }
            
            try {
                const response = await fetch('/api/checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert(`Order placed successfully!\nOrder ID: ${data.orderId}`);
                    window.location.href = `/my-order?order=${data.orderId}`;
                } else {
                    alert(data.error || 'Checkout failed');
                }
            } catch (error) {
                console.error('Error during checkout:', error);
                alert('Checkout failed. Please try again.');
            }
        }
        
        // Close address modal
        function closeAddressModal() {
            document.getElementById('addressModal').classList.remove('active');
        }
        
        // Logout
        async function logout() {
            if (confirm('Are you sure you want to logout?')) {
                await fetch('/api/logout', { method: 'POST' });
                window.location.href = '/';
            }
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            if (await checkAuth()) {
                await loadCart();
                
                // Refresh cart every 30 seconds
                setInterval(loadCart, 30000);
            }
        });
    </script>
</body>
</html>
