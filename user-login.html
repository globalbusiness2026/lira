<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LIRA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-card {
            background: white;
            border-radius: 30px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: var(--shadow-xl);
            animation: slideUp 0.5s ease;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header h1 {
            font-size: 36px;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .login-header p {
            color: var(--gray);
        }
        
        .forgot-links {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
        }
        
        .forgot-links a {
            color: var(--primary);
            text-decoration: none;
            font-size: 14px;
        }
        
        .register-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .register-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        
        .password-toggle {
            position: relative;
        }
        
        .password-toggle i {
            position: absolute;
            right: 15px;
            top: 45px;
            cursor: pointer;
            color: var(--gray);
        }
        
        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="animated-bg">
        <span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>Welcome Back</h1>
                <p>Login to your LIRA account</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">User ID</label>
                    <input type="text" class="form-control" id="userId" placeholder="Enter your User ID" required>
                </div>
                
                <div class="form-group password-toggle">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
                    <i class="fas fa-eye" onclick="togglePassword()"></i>
                </div>
                
                <div class="forgot-links">
                    <a href="/forgot-id">Forgot ID?</a>
                    <a href="/forgot-password">Forgot Password?</a>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;" id="loginBtn">Login</button>
            </form>
            
            <div class="register-link">
                New to LIRA? <a href="/register">Create Account</a>
            </div>
            
            <div style="text-align: center; margin-top: 20px;">
                <a href="/admin-login" style="color: var(--gray); font-size: 14px;">Admin Login</a>
            </div>
        </div>
    </div>

    <script>
        function togglePassword() {
            const password = document.getElementById('password');
            const icon = document.querySelector('.password-toggle i');
            
            if (password.type === 'password') {
                password.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                password.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = {
                userId: document.getElementById('userId').value,
                password: document.getElementById('password').value
            };
            
            try {
                document.getElementById('loginBtn').disabled = true;
                document.getElementById('loginBtn').innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
                
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    if (data.role === 'admin') {
                        window.location.href = '/admin-dashboard';
                    } else {
                        if (data.needsPasswordChange) {
                            if (confirm('For security, please change your default password')) {
                                window.location.href = '/change-password';
                            }
                        }
                        window.location.href = '/dashboard';
                    }
                } else {
                    alert(data.error || 'Login failed');
                }
            } catch (error) {
                console.error('Login error:', error);
                alert('Login failed. Please try again.');
            } finally {
                document.getElementById('loginBtn').disabled = false;
                document.getElementById('loginBtn').innerHTML = 'Login';
            }
        });
    </script>
</body>
</html>
