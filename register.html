<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - LIRA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .register-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .register-card {
            background: white;
            border-radius: 30px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: var(--shadow-xl);
            animation: slideUp 0.5s ease;
        }
        
        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .register-header h1 {
            font-size: 36px;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .register-header p {
            color: var(--gray);
        }
        
        .position-selector {
            display: flex;
            gap: 20px;
            margin: 20px 0;
        }
        
        .position-option {
            flex: 1;
            padding: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .position-option:hover {
            border-color: var(--primary);
        }
        
        .position-option.selected {
            border-color: var(--primary);
            background: rgba(139, 92, 246, 0.1);
        }
        
        .position-option i {
            font-size: 32px;
            color: var(--primary);
            margin-bottom: 10px;
        }
        
        .otp-section {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .otp-section .form-control {
            flex: 1;
        }
        
        .otp-section .btn {
            width: auto;
            padding: 12px 20px;
        }
        
        .login-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .login-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        
        .terms {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
        }
        
        .terms input {
            width: 18px;
            height: 18px;
        }
        
        @media (max-width: 480px) {
            .register-card {
                padding: 30px 20px;
            }
            
            .position-selector {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="animated-bg">
        <span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="register-container">
        <div class="register-card">
            <div class="register-header">
                <h1>Join LIRA Family</h1>
                <p>Start your journey to financial freedom</p>
            </div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label class="form-label">Sponsor ID</label>
                    <input type="text" class="form-control" id="sponsorId" placeholder="Enter Sponsor ID" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="name" placeholder="Enter your full name" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Mobile Number</label>
                    <input type="tel" class="form-control" id="mobile" placeholder="Enter 10 digit mobile" pattern="[0-9]{10}" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <div class="otp-section">
                        <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
                        <button type="button" class="btn btn-outline" id="sendOtpBtn" onclick="sendOtp()">Send OTP</button>
                    </div>
                </div>
                
                <div class="form-group" id="otpGroup" style="display: none;">
                    <label class="form-label">Email OTP</label>
                    <input type="text" class="form-control" id="otp" placeholder="Enter OTP">
                </div>
                
                <label class="form-label">Select Position</label>
                <div class="position-selector">
                    <div class="position-option" onclick="selectPosition('left')" id="posLeft">
                        <i class="fas fa-arrow-left"></i>
                        <h3>Left</h3>
                    </div>
                    <div class="position-option" onclick="selectPosition('right')" id="posRight">
                        <i class="fas fa-arrow-right"></i>
                        <h3>Right</h3>
                    </div>
                </div>
                
                <div class="terms">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">I agree to the <a href="/terms" style="color: var(--primary);">Terms & Conditions</a></label>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;" id="registerBtn">Register Now</button>
            </form>
            
            <div class="login-link">
                Already have an account? <a href="/user-login">Login here</a>
            </div>
        </div>
    </div>

    <script>
        let selectedPosition = '';
        let otpVerified = false;
        
        function selectPosition(position) {
            selectedPosition = position;
            document.querySelectorAll('.position-option').forEach(el => {
                el.classList.remove('selected');
            });
            document.getElementById(`pos${position.charAt(0).toUpperCase() + position.slice(1)}`).classList.add('selected');
        }
        
        async function sendOtp() {
            const email = document.getElementById('email').value;
            if (!email) {
                alert('Please enter email first');
                return;
            }
            
            try {
                const response = await fetch('/api/send-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const data = await response.json();
                if (data.success) {
                    document.getElementById('otpGroup').style.display = 'block';
                    alert('OTP sent to your email');
                    
                    // Auto-verify for demo (remove in production)
                    setTimeout(() => {
                        document.getElementById('otp').value = '123456';
                        verifyOtp();
                    }, 2000);
                }
            } catch (error) {
                console.error('Error sending OTP:', error);
            }
        }
        
        async function verifyOtp() {
            const otp = document.getElementById('otp').value;
            if (!otp) {
                alert('Please enter OTP');
                return;
            }
            
            // In production, verify OTP with backend
            otpVerified = true;
            alert('Email verified successfully');
        }
        
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!selectedPosition) {
                alert('Please select a position');
                return;
            }
            
            if (!otpVerified) {
                alert('Please verify your email first');
                return;
            }
            
            if (!document.getElementById('terms').checked) {
                alert('Please accept terms and conditions');
                return;
            }
            
            const formData = {
                sponsorId: document.getElementById('sponsorId').value,
                name: document.getElementById('name').value,
                mobile: document.getElementById('mobile').value,
                email: document.getElementById('email').value,
                position: selectedPosition
            };
            
            try {
                document.getElementById('registerBtn').disabled = true;
                document.getElementById('registerBtn').innerHTML = '<i class="fas fa-spinner fa-spin"></i> Registering...';
                
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert(`Registration successful!\nUser ID: ${data.userId}\nPassword: ${data.password}\nPlease save this information.`);
                    window.location.href = '/login';
                } else {
                    alert(data.error || 'Registration failed');
                }
            } catch (error) {
                console.error('Registration error:', error);
                alert('Registration failed. Please try again.');
            } finally {
                document.getElementById('registerBtn').disabled = false;
                document.getElementById('registerBtn').innerHTML = 'Register Now';
            }
        });
    </script>
</body>
</html>
