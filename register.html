<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - LIRA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .register-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .register-card {
            background: white;
            border-radius: 30px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: var(--shadow-xl);
            animation: slideUp 0.5s ease;
        }
        
        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .register-header h1 {
            font-size: 36px;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .register-header p {
            color: var(--gray);
        }
        
        .otp-section {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .otp-section .form-control {
            flex: 1;
        }
        
        .otp-section .btn {
            width: auto;
            padding: 12px 20px;
            white-space: nowrap;
        }
        
        .otp-input-group {
            margin-top: 15px;
            animation: slideDown 0.3s ease;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .login-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .login-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        
        .terms {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
        }
        
        .terms input {
            width: 18px;
            height: 18px;
        }
        
        .message-box {
            padding: 12px;
            border-radius: 8px;
            margin: 15px 0;
            display: none;
        }
        
        .message-box.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .message-box.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        .message-box.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }
        
        .hidden-field {
            display: none;
        }
        
        @media (max-width: 480px) {
            .register-card {
                padding: 30px 20px;
            }
            
            .otp-section {
                flex-direction: column;
            }
            
            .otp-section .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="animated-bg">
        <span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="register-container">
        <div class="register-card">
            <div class="register-header">
                <h1>Join LIRA Family</h1>
                <p>Start your journey to financial freedom</p>
            </div>
            
            <div id="messageBox" class="message-box"></div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label class="form-label">Sponsor ID</label>
                    <input type="text" class="form-control" id="sponsorId" placeholder="Enter Sponsor ID" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="name" placeholder="Enter your full name" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Mobile Number</label>
                    <input type="tel" class="form-control" id="mobile" placeholder="Enter 10 digit mobile" pattern="[0-9]{10}" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <div class="otp-section">
                        <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
                        <button type="button" class="btn btn-outline" id="sendOtpBtn">Send OTP</button>
                    </div>
                </div>
                
                <!-- Hidden position field - auto left/right placement -->
                <input type="hidden" id="position" value="auto">
                
                <div class="form-group otp-input-group" id="otpGroup" style="display: none;">
                    <label class="form-label">Email OTP</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" class="form-control" id="otp" placeholder="Enter 6-digit OTP" maxlength="6" pattern="[0-9]{6}">
                        <button type="button" class="btn btn-outline" id="verifyOtpBtn">Verify</button>
                    </div>
                    <small style="color: var(--gray); margin-top: 5px; display: block;">OTP sent to your email. Please check inbox.</small>
                </div>
                
                <div class="terms">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">I agree to the <a href="/terms" style="color: var(--primary);">Terms & Conditions</a></label>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;" id="registerBtn" disabled>Register Now</button>
            </form>
            
            <div class="login-link">
                Already have an account? <a href="/login">Login here</a>
            </div>
        </div>
    </div>

    <script>
        let otpVerified = false;
        let otpSent = false;
        
        // Message display function
        function showMessage(message, type) {
            const messageBox = document.getElementById('messageBox');
            messageBox.className = `message-box ${type}`;
            messageBox.textContent = message;
            messageBox.style.display = 'block';
            
            setTimeout(() => {
                messageBox.style.display = 'none';
            }, 5000);
        }
        
        // Send OTP
        document.getElementById('sendOtpBtn').addEventListener('click', async function() {
            const email = document.getElementById('email').value;
            const sendBtn = this;
            
            if (!email) {
                showMessage('Please enter email first', 'error');
                return;
            }
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showMessage('Please enter a valid email address', 'error');
                return;
            }
            
            try {
                sendBtn.disabled = true;
                sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
                
                console.log('Sending OTP request for:', email);
                
                const response = await fetch('/api/send-otp', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ email })
                });
                
                console.log('Response status:', response.status);
                
                const data = await response.json();
                console.log('Response data:', data);
                
                if (response.ok && data.success) {
                    otpSent = true;
                    document.getElementById('otpGroup').style.display = 'block';
                    showMessage('OTP sent to your email. Please check your inbox.', 'success');
                    sendBtn.innerHTML = 'Resend OTP';
                    sendBtn.disabled = false;
                } else {
                    showMessage(data.error || 'Failed to send OTP', 'error');
                    sendBtn.innerHTML = 'Send OTP';
                    sendBtn.disabled = false;
                }
            } catch (error) {
                console.error('Error sending OTP:', error);
                showMessage('Network error. Please try again.', 'error');
                sendBtn.innerHTML = 'Send OTP';
                sendBtn.disabled = false;
            }
        });
        
        // Verify OTP
        document.getElementById('verifyOtpBtn').addEventListener('click', async function() {
            const otp = document.getElementById('otp').value;
            const email = document.getElementById('email').value;
            const verifyBtn = this;
            
            if (!otp || otp.length !== 6 || !/^\d+$/.test(otp)) {
                showMessage('Please enter valid 6-digit OTP', 'error');
                return;
            }
            
            try {
                verifyBtn.disabled = true;
                verifyBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';
                
                console.log('Verifying OTP for:', email);
                
                const response = await fetch('/api/verify-otp', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ email, otp })
                });
                
                console.log('Verify response status:', response.status);
                
                const data = await response.json();
                console.log('Verify response data:', data);
                
                if (response.ok && data.success) {
                    otpVerified = true;
                    document.getElementById('registerBtn').disabled = false;
                    document.getElementById('otpGroup').style.display = 'none';
                    document.getElementById('sendOtpBtn').innerHTML = 'OTP Verified ✓';
                    document.getElementById('sendOtpBtn').disabled = true;
                    showMessage('Email verified successfully! You can now register.', 'success');
                } else {
                    showMessage(data.error || 'Invalid OTP', 'error');
                    verifyBtn.disabled = false;
                    verifyBtn.innerHTML = 'Verify';
                }
            } catch (error) {
                console.error('Error verifying OTP:', error);
                showMessage('Network error. Please try again.', 'error');
                verifyBtn.disabled = false;
                verifyBtn.innerHTML = 'Verify';
            }
        });
        
        // Form submission
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!otpVerified) {
                showMessage('Please verify your email first', 'error');
                return;
            }
            
            if (!document.getElementById('terms').checked) {
                showMessage('Please accept terms and conditions', 'error');
                return;
            }
            
            const formData = {
                sponsorId: document.getElementById('sponsorId').value,
                name: document.getElementById('name').value,
                mobile: document.getElementById('mobile').value,
                email: document.getElementById('email').value,
                position: 'auto'
            };
            
            const registerBtn = document.getElementById('registerBtn');
            
            try {
                registerBtn.disabled = true;
                registerBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Registering...';
                
                console.log('Sending registration request:', formData);
                
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });
                
                console.log('Register response status:', response.status);
                
                const data = await response.json();
                console.log('Register response data:', data);
                
                if (response.ok && data.success) {
                    showMessage(`Registration successful! User ID: ${data.userId}\nPassword: ${data.password}`, 'success');
                    
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 3000);
                } else {
                    showMessage(data.error || 'Registration failed', 'error');
                    registerBtn.disabled = false;
                    registerBtn.innerHTML = 'Register Now';
                }
            } catch (error) {
                console.error('Registration error:', error);
                showMessage('Network error. Please try again.', 'error');
                registerBtn.disabled = false;
                registerBtn.innerHTML = 'Register Now';
            }
        });
    </script>
</body>
</html>
