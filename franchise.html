<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Franchise Dashboard - LIRA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .franchise-container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
        }
        
        .page-header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.5s ease;
        }
        
        .page-header h1 {
            font-size: 42px;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .franchise-banner {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 30px;
            padding: 40px;
            color: white;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.5s ease;
        }
        
        .franchise-banner::before {
            content: '🏪';
            position: absolute;
            right: -20px;
            bottom: -20px;
            font-size: 150px;
            opacity: 0.2;
            transform: rotate(-15deg);
        }
        
        .franchise-badge {
            display: inline-block;
            padding: 8px 25px;
            background: rgba(255,255,255,0.2);
            border-radius: 50px;
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .franchise-title {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .franchise-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }
        
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: var(--shadow);
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-xl);
        }
        
        .stat-icon {
            width: 60px;
            height: 60px;
            background: var(--gradient-1);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            color: white;
            font-size: 24px;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--dark);
        }
        
        .stat-label {
            color: var(--gray);
            font-size: 14px;
        }
        
        .delivery-section {
            background: white;
            border-radius: 30px;
            padding: 30px;
            margin: 30px 0;
            box-shadow: var(--shadow);
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .section-title {
            font-size: 24px;
            font-weight: 700;
        }
        
        .delivery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        
        .delivery-card {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 20px;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        
        .delivery-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow);
            border-color: var(--primary);
        }
        
        .delivery-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .order-id {
            font-weight: 700;
            color: var(--primary);
        }
        
        .customer-info {
            margin-bottom: 15px;
        }
        
        .customer-name {
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .customer-address {
            font-size: 14px;
            color: var(--gray);
        }
        
        .product-list {
            margin: 15px 0;
            padding: 10px;
            background: white;
            border-radius: 12px;
        }
        
        .product-item {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            padding: 5px 0;
        }
        
        .delivery-otp {
            background: var(--gradient-1);
            color: white;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 5px;
            margin: 15px 0;
        }
        
        .delivery-actions {
            display: flex;
            gap: 10px;
        }
        
        .action-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .complete-btn {
            background: var(--success);
            color: white;
        }
        
        .complete-btn:hover {
            background: #0ca678;
            transform: scale(1.02);
        }
        
        .map-btn {
            background: var(--primary);
            color: white;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--gray);
        }
        
        .empty-state i {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.3;
        }
        
        .otp-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .otp-modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 30px;
            padding: 40px;
            max-width: 400px;
            width: 90%;
            animation: slideUp 0.3s ease;
        }
        
        .otp-input {
            font-size: 32px;
            letter-spacing: 10px;
            text-align: center;
            font-weight: 700;
            padding: 15px;
        }
        
        @media (max-width: 768px) {
            .franchise-title {
                font-size: 28px;
            }
            
            .delivery-grid {
                grid-template-columns: 1fr;
            }
            
            .section-header {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="animated-bg">
        <span></span><span></span><span></span><span></span><span></span>
    </div>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="/" class="logo">LIRA</a>
            <div class="mobile-menu-btn">
                <i class="fas fa-bars"></i>
            </div>
            <div class="nav-menu">
                <a href="/dashboard" class="nav-link">Dashboard</a>
                <a href="/products" class="nav-link">Shop</a>
                <a href="/franchise" class="nav-link active">Franchise</a>
                <a href="/franchise-purchase" class="nav-link">Bulk Purchase</a>
                <a href="/income-history" class="nav-link">Income</a>
                <a href="/member-message" class="nav-link">
                    <i class="fas fa-comment"></i>
                    <span class="message-badge" id="unreadCount">0</span>
                </a>
                <div class="nav-link" onclick="logout()" style="cursor: pointer;">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </div>
            </div>
        </div>
    </nav>

    <div class="franchise-container" id="franchiseContainer">
        <!-- Content will be loaded dynamically -->
        <div class="loader"></div>
    </div>

    <!-- OTP Modal -->
    <div class="otp-modal" id="otpModal">
        <div class="modal-content">
            <h3 style="margin-bottom: 20px;">Enter Delivery OTP</h3>
            <p style="color: var(--gray); margin-bottom: 20px;">Ask customer for the 6-digit OTP</p>
            <input type="text" class="form-control otp-input" id="deliveryOtp" maxlength="6" placeholder="------">
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn btn-outline" style="flex: 1;" onclick="closeOtpModal()">Cancel</button>
                <button class="btn btn-primary" style="flex: 1;" onclick="verifyDelivery()">Verify</button>
            </div>
        </div>
    </div>

    <script>
        let currentDelivery = null;
        
        // Check authentication
        async function checkAuth() {
            const session = await fetch('/api/session').then(r => r.json());
            if (!session.loggedIn) {
                window.location.href = '/login';
                return false;
            }
            return true;
        }
        
        // Load franchise data
        async function loadFranchiseData() {
            try {
                const response = await fetch('/api/franchise');
                const data = await response.json();
                
                const container = document.getElementById('franchiseContainer');
                
                if (!data.isFranchise) {
                    // Show non-franchise message
                    container.innerHTML = `
                        <div class="page-header">
                            <h1>Franchise Program</h1>
                            <p>Become a LIRA Franchise Partner</p>
                        </div>
                        
                        <div class="franchise-banner">
                            <div class="franchise-badge">Partner Program</div>
                            <div class="franchise-title">Become a Franchise</div>
                            <p style="margin-bottom: 20px;">Start your own business with LIRA</p>
                            <button class="btn btn-primary" onclick="window.location.href='/franchise-purchase'">
                                Buy Franchise Package
                            </button>
                        </div>
                        
                        <div class="franchise-stats">
                            <div class="stat-card">
                                <div class="stat-icon"><i class="fas fa-box"></i></div>
                                <div class="stat-value">₹${data.requirements?.minBulkPurchase || 10000}</div>
                                <div class="stat-label">Minimum Bulk Purchase</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-icon"><i class="fas fa-users"></i></div>
                                <div class="stat-value">${data.requirements?.minActiveDirects || 10}</div>
                                <div class="stat-label">Active Directs Required</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-icon"><i class="fas fa-lock"></i></div>
                                <div class="stat-value">₹${(data.requirements?.minLockIn || 100000).toLocaleString()}</div>
                                <div class="stat-label">12-Month Lock-in</div>
                            </div>
                        </div>
                        
                        <div style="text-align: center;">
                            <h3 style="margin-bottom: 20px;">Franchise Benefits</h3>
                            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;">
                                <div class="stat-card">
                                    <i class="fas fa-truck" style="font-size: 40px; color: var(--primary); margin-bottom: 10px;"></i>
                                    <h4>Delivery Commission</h4>
                                    <p>Earn on every delivery</p>
                                </div>
                                <div class="stat-card">
                                    <i class="fas fa-chart-line" style="font-size: 40px; color: var(--primary); margin-bottom: 10px;"></i>
                                    <h4>Higher Income</h4>
                                    <p>Special franchise bonuses</p>
                                </div>
                                <div class="stat-card">
                                    <i class="fas fa-crown" style="font-size: 40px; color: var(--primary); margin-bottom: 10px;"></i>
                                    <h4>Exclusive Status</h4>
                                    <p>Micro, Mini, Max stages</p>
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    // Show franchise dashboard
                    renderFranchiseDashboard(data);
                }
            } catch (error) {
                console.error('Error loading franchise data:', error);
            }
        }
        
        // Render franchise dashboard
        function renderFranchiseDashboard(data) {
            const container = document.getElementById('franchiseContainer');
            
            container.innerHTML = `
                <div class="page-header">
                    <h1>Franchise Dashboard</h1>
                    <p>Manage your deliveries and track performance</p>
                </div>
                
                <div class="franchise-banner">
                    <div class="franchise-badge">${data.stage.charAt(0).toUpperCase() + data.stage.slice(1)} Franchise</div>
                    <div class="franchise-title">Welcome, Franchise Partner!</div>
                    <p>Your pincode: ${data.franchise?.pinCodes?.join(', ') || 'Not assigned'}</p>
                </div>
                
                <div class="franchise-stats">
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-box"></i></div>
                        <div class="stat-value">${data.franchise?.bulkPurchase || 0}</div>
                        <div class="stat-label">Bulk Purchase</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-truck"></i></div>
                        <div class="stat-value">${data.franchise?.totalDelivery || 0}</div>
                        <div class="stat-label">Delivered</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-clock"></i></div>
                        <div class="stat-value">${data.franchise?.pendingDelivery || 0}</div>
                        <div class="stat-label">Pending</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-rupee-sign"></i></div>
                        <div class="stat-value">₹${data.franchise?.totalEarned || 0}</div>
                        <div class="stat-label">Total Earned</div>
                    </div>
                </div>
                
                <div class="delivery-section">
                    <div class="section-header">
                        <div class="section-title">Pending Deliveries</div>
                        <button class="btn btn-outline" onclick="refreshDeliveries()">
                            <i class="fas fa-sync-alt"></i> Refresh
                        </button>
                    </div>
                    
                    <div id="pendingDeliveries" class="delivery-grid">
                        ${renderDeliveries(data.deliveries?.filter(d => d.status !== 'delivered'))}
                    </div>
                </div>
                
                <div class="delivery-section">
                    <div class="section-header">
                        <div class="section-title">Completed Deliveries</div>
                    </div>
                    
                    <div id="completedDeliveries" class="delivery-grid">
                        ${renderDeliveries(data.deliveries?.filter(d => d.status === 'delivered'), true)}
                    </div>
                </div>
            `;
        }
        
        // Render deliveries
        function renderDeliveries(deliveries, completed = false) {
            if (!deliveries || deliveries.length === 0) {
                return `
                    <div class="empty-state">
                        <i class="fas fa-${completed ? 'check-circle' : 'truck'}"></i>
                        <h3>No ${completed ? 'completed' : 'pending'} deliveries</h3>
                        <p>${completed ? 'You haven\'t completed any deliveries yet' : 'New deliveries will appear here'}</p>
                    </div>
                `;
            }
            
            return deliveries.map(delivery => `
                <div class="delivery-card">
                    <div class="delivery-header">
                        <span class="order-id">Order #${delivery.orderId}</span>
                        <span class="status-badge status-${delivery.status}">${delivery.status}</span>
                    </div>
                    
                    <div class="customer-info">
                        <div class="customer-name">${delivery.customerName || 'Customer'}</div>
                        <div class="customer-address">${delivery.address || 'Address not available'}</div>
                    </div>
                    
                    <div class="product-list">
                        ${delivery.products?.map(p => `
                            <div class="product-item">
                                <span>${p.name} x${p.quantity}</span>
                                <span>₹${p.price * p.quantity}</span>
                            </div>
                        `).join('')}
                    </div>
                    
                    ${!completed ? `
                        <div class="delivery-otp" id="otp-${delivery.deliveryId}">
                            ${delivery.otp || '------'}
                        </div>
                        
                        <div class="delivery-actions">
                            <button class="action-btn complete-btn" onclick="openOtpModal('${delivery.deliveryId}')">
                                <i class="fas fa-check"></i> Complete Delivery
                            </button>
                            <button class="action-btn map-btn" onclick="showMap('${delivery.address}')">
                                <i class="fas fa-map-marker-alt"></i>
                            </button>
                        </div>
                    ` : `
                        <div style="text-align: center; color: var(--success);">
                            <i class="fas fa-check-circle"></i> Delivered on ${new Date(delivery.deliveryDate).toLocaleDateString()}
                        </div>
                    `}
                </div>
            `).join('');
        }
        
        // Open OTP modal
        function openOtpModal(deliveryId) {
            currentDelivery = deliveryId;
            document.getElementById('otpModal').classList.add('active');
            document.getElementById('deliveryOtp').value = '';
            document.getElementById('deliveryOtp').focus();
        }
        
        // Close OTP modal
        function closeOtpModal() {
            document.getElementById('otpModal').classList.remove('active');
            currentDelivery = null;
        }
        
        // Verify delivery
        async function verifyDelivery() {
            const otp = document.getElementById('deliveryOtp').value;
            
            if (!otp || otp.length !== 6) {
                alert('Please enter valid 6-digit OTP');
                return;
            }
            
            try {
                const response = await fetch('/api/delivery/complete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        deliveryId: currentDelivery,
                        otp: otp
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('Delivery completed successfully!');
                    closeOtpModal();
                    loadFranchiseData(); // Refresh
                    
                    // Play success sound
                    playSuccess();
                } else {
                    alert(data.error || 'Invalid OTP');
                }
            } catch (error) {
                console.error('Error completing delivery:', error);
                alert('Failed to complete delivery');
            }
        }
        
        // Play success sound
        function playSuccess() {
            const audio = new Audio('data:audio/wav;base64,UklGRlwAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YVoAAACAgICAf39/f39/f3+AgICAf39/f39/f39/f3+AgICAf39/f39/f3+AgICAf39/f39/f39/f3+AgICAf39/f38=');
            audio.play().catch(e => console.log('Audio play failed:', e));
        }
        
        // Refresh deliveries
        function refreshDeliveries() {
            loadFranchiseData();
        }
        
        // Show map (simplified)
        function showMap(address) {
            window.open(`https://maps.google.com/?q=${encodeURIComponent(address)}`);
        }
        
        // Logout
        async function logout() {
            if (confirm('Are you sure you want to logout?')) {
                await fetch('/api/logout', { method: 'POST' });
                window.location.href = '/';
            }
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            if (await checkAuth()) {
                loadFranchiseData();
            }
        });
    </script>
</body>
</html>
