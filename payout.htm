<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Payout Management - LIRA Admin</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .payout-container {
            max-width: 1600px;
            margin: 20px auto;
            padding: 0 20px;
        }
        
        .page-header {
            background: white;
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .page-title h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }
        
        .page-title p {
            color: var(--gray);
        }
        
        .header-actions {
            display: flex;
            gap: 15px;
        }
        
        .action-btn {
            padding: 12px 25px;
            background: var(--gradient-1);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-xl);
        }
        
        .stat-icon {
            width: 60px;
            height: 60px;
            background: var(--gradient-1);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }
        
        .stat-content {
            flex: 1;
        }
        
        .stat-label {
            color: var(--gray);
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--dark);
        }
        
        .stat-sub {
            font-size: 12px;
            color: var(--success);
        }
        
        .filter-section {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
        }
        
        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .filter-label {
            font-weight: 600;
            font-size: 14px;
        }
        
        .filter-select, .filter-input {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
        }
        
        .filter-select:focus, .filter-input:focus {
            border-color: var(--primary);
            outline: none;
        }
        
        .tabs-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .tab-btn {
            padding: 12px 30px;
            background: white;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
        }
        
        .tab-btn:hover {
            transform: translateY(-2px);
        }
        
        .tab-btn.active {
            background: var(--gradient-1);
            color: white;
        }
        
        .payout-table-container {
            background: white;
            border-radius: 30px;
            padding: 30px;
            box-shadow: var(--shadow);
            overflow-x: auto;
        }
        
        .payout-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1200px;
        }
        
        .payout-table th {
            background: #f8f9fa;
            padding: 15px;
            font-weight: 600;
            text-align: left;
        }
        
        .payout-table td {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .payout-table tr {
            transition: all 0.3s ease;
        }
        
        .payout-table tr:hover {
            background: #f8f9fa;
        }
        
        .payout-table tr.pending {
            background: #fff3cd;
        }
        
        .payout-table tr.approved {
            background: #d4edda;
        }
        
        .payout-table tr.rejected {
            background: #f8d7da;
        }
        
        .member-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .member-avatar {
            width: 40px;
            height: 40px;
            background: var(--gradient-1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }
        
        .status-badge {
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }
        
        .status-pending {
            background: #fff3cd;
            color: #856404;
        }
        
        .status-approved {
            background: #d4edda;
            color: #155724;
        }
        
        .status-rejected {
            background: #f8d7da;
            color: #721c24;
        }
        
        .status-processed {
            background: #cce5ff;
            color: #004085;
        }
        
        .action-buttons {
            display: flex;
            gap: 8px;
        }
        
        .approve-btn {
            padding: 8px 16px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 12px;
            font-weight: 600;
        }
        
        .approve-btn:hover {
            background: #0ca678;
            transform: scale(1.05);
        }
        
        .reject-btn {
            padding: 8px 16px;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 12px;
            font-weight: 600;
        }
        
        .reject-btn:hover {
            background: #ff1744;
            transform: scale(1.05);
        }
        
        .view-btn {
            padding: 8px 12px;
            background: #f0f0f0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .view-btn:hover {
            background: var(--primary);
            color: white;
        }
        
        .amount-highlight {
            font-weight: 700;
            color: var(--success);
        }
        
        .net-amount {
            font-weight: 700;
            color: var(--primary);
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
        }
        
        .page-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: white;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .page-btn:hover,
        .page-btn.active {
            background: var(--primary);
            color: white;
        }
        
        /* Modal Styles */
        .payout-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        
        .payout-modal.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }
        
        .modal-content {
            background: white;
            border-radius: 30px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-title {
            font-size: 24px;
            font-weight: 700;
        }
        
        .modal-close {
            font-size: 24px;
            cursor: pointer;
            color: var(--gray);
        }
        
        .modal-close:hover {
            color: var(--danger);
        }
        
        .detail-row {
            display: flex;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .detail-label {
            width: 120px;
            font-weight: 600;
            color: var(--gray);
        }
        
        .detail-value {
            flex: 1;
            font-weight: 600;
        }
        
        .bank-details {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
        }
        
        .remarks-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            margin: 15px 0;
        }
        
        .remarks-input:focus {
            border-color: var(--primary);
            outline: none;
        }
        
        .modal-actions {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        
        .modal-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .modal-btn.approve {
            background: var(--success);
            color: white;
        }
        
        .modal-btn.reject {
            background: var(--danger);
            color: white;
        }
        
        .modal-btn.cancel {
            background: #f0f0f0;
            color: var(--dark);
        }
        
        .modal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        /* Summary Cards */
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .summary-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            padding: 20px;
            color: white;
        }
        
        .summary-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 5px;
        }
        
        .summary-value {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .summary-change {
            font-size: 12px;
            opacity: 0.8;
        }
        
        @media (max-width: 768px) {
            .filter-grid {
                grid-template-columns: 1fr;
            }
            
            .tabs-container {
                justify-content: center;
            }
            
            .action-buttons {
                flex-direction: column;
            }
            
            .modal-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="animated-bg">
        <span></span><span></span><span></span><span></span><span></span>
    </div>

    <!-- Admin Navbar -->
    <nav class="navbar" style="background: #1e1e2f;">
        <div class="navbar-container">
            <a href="/admin-dashboard" class="logo" style="color: white;">LIRA Admin</a>
            <div class="mobile-menu-btn" style="color: white;">
                <i class="fas fa-bars"></i>
            </div>
            <div class="nav-menu">
                <a href="/admin-dashboard" class="nav-link" style="color: white;">Dashboard</a>
                <a href="/all-member" class="nav-link" style="color: white;">Members</a>
                <a href="/add-product" class="nav-link" style="color: white;">Products</a>
                <a href="/income-settings" class="nav-link" style="color: white;">Income</a>
                <a href="/payout" class="nav-link active" style="color: white;">Payouts</a>
                <div class="nav-link" onclick="logout()" style="cursor: pointer; color: white;">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </div>
            </div>
        </div>
    </nav>

    <div class="payout-container">
        <!-- Page Header -->
        <div class="page-header">
            <div class="page-title">
                <h1>Payout Management</h1>
                <p>Approve, reject, and track member withdrawal requests</p>
            </div>
            <div class="header-actions">
                <button class="action-btn" onclick="exportPayouts()">
                    <i class="fas fa-download"></i> Export Report
                </button>
                <button class="action-btn" onclick="processBulk()">
                    <i class="fas fa-tasks"></i> Bulk Process
                </button>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="stats-grid" id="statsGrid">
            <!-- Loaded via JS -->
        </div>

        <!-- Filter Section -->
        <div class="filter-section">
            <div class="filter-grid">
                <div class="filter-group">
                    <label class="filter-label">Status</label>
                    <select class="filter-select" id="statusFilter" onchange="applyFilters()">
                        <option value="all">All Requests</option>
                        <option value="pending">Pending</option>
                        <option value="approved">Approved</option>
                        <option value="rejected">Rejected</option>
                        <option value="processed">Processed</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label class="filter-label">Date Range</label>
                    <select class="filter-select" id="dateFilter" onchange="applyFilters()">
                        <option value="today">Today</option>
                        <option value="yesterday">Yesterday</option>
                        <option value="week">This Week</option>
                        <option value="month">This Month</option>
                        <option value="custom">Custom</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label class="filter-label">From Date</label>
                    <input type="date" class="filter-input" id="fromDate">
                </div>
                
                <div class="filter-group">
                    <label class="filter-label">To Date</label>
                    <input type="date" class="filter-input" id="toDate">
                </div>
                
                <div class="filter-group">
                    <label class="filter-label">Search</label>
                    <input type="text" class="filter-input" id="searchInput" placeholder="User ID, Name, Request ID">
                </div>
                
                <div class="filter-group" style="justify-content: flex-end;">
                    <button class="btn btn-primary" onclick="applyFilters()">Apply Filters</button>
                </div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs-container">
            <button class="tab-btn active" onclick="switchTab('all')">All Requests</button>
            <button class="tab-btn" onclick="switchTab('pending')">Pending</button>
            <button class="tab-btn" onclick="switchTab('approved')">Approved</button>
            <button class="tab-btn" onclick="switchTab('rejected')">Rejected</button>
            <button class="tab-btn" onclick="switchTab('processed')">Processed</button>
        </div>

        <!-- Payout Table -->
        <div class="payout-table-container">
            <table class="payout-table">
                <thead>
                    <tr>
                        <th><input type="checkbox" id="selectAll" onclick="toggleAll()"></th>
                        <th>Request ID</th>
                        <th>Member</th>
                        <th>Request Date</th>
                        <th>Amount</th>
                        <th>TDS</th>
                        <th>Admin</th>
                        <th>Net Amount</th>
                        <th>Bank Details</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="payoutTableBody">
                    <tr>
                        <td colspan="11" style="text-align: center; padding: 50px;">
                            <div class="loader"></div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="pagination" id="pagination"></div>
    </div>

    <!-- Payout Details Modal -->
    <div class="payout-modal" id="payoutModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">Payout Details</div>
                <div class="modal-close" onclick="closeModal()">&times;</div>
            </div>
            
            <div id="modalContent"></div>
        </div>
    </div>

    <!-- Reject Reason Modal -->
    <div class="payout-modal" id="rejectModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">Reject Request</div>
                <div class="modal-close" onclick="closeRejectModal()">&times;</div>
            </div>
            
            <div style="padding: 20px 0;">
                <label class="form-label">Rejection Reason</label>
                <textarea class="remarks-input" id="rejectReason" rows="4" placeholder="Enter reason for rejection..."></textarea>
                
                <div class="modal-actions">
                    <button class="modal-btn cancel" onclick="closeRejectModal()">Cancel</button>
                    <button class="modal-btn reject" onclick="confirmReject()">Reject Request</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentPayout = null;
        let currentPage = 1;
        let selectedPayouts = [];
        
        // Check authentication
        async function checkAuth() {
            const session = await fetch('/api/session').then(r => r.json());
            if (!session.loggedIn || session.role !== 'admin') {
                window.location.href = '/admin-login';
                return false;
            }
            return true;
        }
        
        // Load payouts
        async function loadPayouts(page = 1) {
            try {
                const status = document.getElementById('statusFilter').value;
                const search = document.getElementById('searchInput').value;
                const fromDate = document.getElementById('fromDate').value;
                const toDate = document.getElementById('toDate').value;
                
                let url = `/api/admin/withdrawals?page=${page}`;
                if (status !== 'all') url += `&status=${status}`;
                if (search) url += `&search=${search}`;
                if (fromDate) url += `&from=${fromDate}`;
                if (toDate) url += `&to=${toDate}`;
                
                const response = await fetch(url);
                const data = await response.json();
                
                updateStats(data.stats);
                updateTable(data.withdrawals);
                updatePagination(data.totalPages, page);
                
            } catch (error) {
                console.error('Error loading payouts:', error);
            }
        }
        
        // Update stats
        function updateStats(stats) {
            const statsGrid = document.getElementById('statsGrid');
            
            statsGrid.innerHTML = `
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-clock"></i></div>
                    <div class="stat-content">
                        <div class="stat-label">Pending Requests</div>
                        <div class="stat-value">${stats.pending}</div>
                        <div class="stat-sub">Amount: ₹${stats.pendingAmount}</div>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
                    <div class="stat-content">
                        <div class="stat-label">Approved Today</div>
                        <div class="stat-value">${stats.approvedToday}</div>
                        <div class="stat-sub">₹${stats.approvedAmount}</div>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-times-circle"></i></div>
                    <div class="stat-content">
                        <div class="stat-label">Rejected Today</div>
                        <div class="stat-value">${stats.rejectedToday}</div>
                        <div class="stat-sub">Amount: ₹${stats.rejectedAmount}</div>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-rupee-sign"></i></div>
                    <div class="stat-content">
                        <div class="stat-label">Total Paid</div>
                        <div class="stat-value">₹${stats.totalPaid}</div>
                        <div class="stat-sub">This month</div>
                    </div>
                </div>
            `;
        }
        
        // Update table
        function updateTable(payouts) {
            const tbody = document.getElementById('payoutTableBody');
            
            if (!payouts || payouts.length === 0) {
                tbody.innerHTML = '<tr><td colspan="11" style="text-align: center;">No payout requests found</td></tr>';
                return;
            }
            
            tbody.innerHTML = payouts.map(payout => `
                <tr class="${payout.status}">
                    <td><input type="checkbox" class="payout-checkbox" value="${payout.withdrawalId}" onchange="updateSelected()"></td>
                    <td><strong>${payout.withdrawalId}</strong></td>
                    <td>
                        <div class="member-info">
                            <div class="member-avatar">${payout.user?.name?.charAt(0) || 'U'}</div>
                            <div>
                                <div>${payout.user?.name || 'Unknown'}</div>
                                <div style="font-size: 12px;">${payout.userId}</div>
                            </div>
                        </div>
                    </td>
                    <td>${new Date(payout.requestDate).toLocaleString()}</td>
                    <td class="amount-highlight">₹${payout.amount.toLocaleString()}</td>
                    <td>₹${payout.tds.toLocaleString()}</td>
                    <td>₹${payout.adminCharge.toLocaleString()}</td>
                    <td class="net-amount">₹${payout.netAmount.toLocaleString()}</td>
                    <td>
                        <button class="view-btn" onclick="viewBankDetails('${payout.userId}')">
                            <i class="fas fa-eye"></i> View
                        </button>
                    </td>
                    <td>
                        <span class="status-badge status-${payout.status}">
                            ${payout.status}
                        </span>
                    </td>
                    <td>
                        <div class="action-buttons">
                            ${payout.status === 'pending' ? `
                                <button class="approve-btn" onclick="showApproveModal('${payout.withdrawalId}')">
                                    <i class="fas fa-check"></i>
                                </button>
                                <button class="reject-btn" onclick="showRejectModal('${payout.withdrawalId}')">
                                    <i class="fas fa-times"></i>
                                </button>
                            ` : ''}
                            <button class="view-btn" onclick="viewDetails('${payout.withdrawalId}')">
                                <i class="fas fa-info-circle"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }
        
        // Update pagination
        function updatePagination(totalPages, current) {
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';
            
            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button');
                btn.className = `page-btn ${i === current ? 'active' : ''}`;
                btn.textContent = i;
                btn.onclick = () => {
                    currentPage = i;
                    loadPayouts(i);
                };
                pagination.appendChild(btn);
            }
        }
        
        // Switch tab
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('statusFilter').value = tab === 'all' ? 'all' : tab;
            loadPayouts(1);
        }
        
        // Apply filters
        function applyFilters() {
            loadPayouts(1);
        }
        
        // View details
        async function viewDetails(withdrawalId) {
            try {
                const response = await fetch(`/api/admin/withdrawals/${withdrawalId}`);
                const payout = await response.json();
                
                const modal = document.getElementById('payoutModal');
                const content = document.getElementById('modalContent');
                
                content.innerHTML = `
                    <div class="detail-row">
                        <span class="detail-label">Request ID:</span>
                        <span class="detail-value">${payout.withdrawalId}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">User ID:</span>
                        <span class="detail-value">${payout.userId}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">User Name:</span>
                        <span class="detail-value">${payout.user?.name}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Request Date:</span>
                        <span class="detail-value">${new Date(payout.requestDate).toLocaleString()}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Amount:</span>
                        <span class="detail-value">₹${payout.amount}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">TDS (10%):</span>
                        <span class="detail-value">₹${payout.tds}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Admin Charge (5%):</span>
                        <span class="detail-value">₹${payout.adminCharge}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Net Amount:</span>
                        <span class="detail-value" style="color: var(--success);">₹${payout.netAmount}</span>
                    </div>
                    
                    <div class="bank-details">
                        <h4 style="margin-bottom: 10px;">Bank Details</h4>
                        <div class="detail-row">
                            <span class="detail-label">Account Name:</span>
                            <span class="detail-value">${payout.user?.bankDetails?.accountName || 'N/A'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Account No:</span>
                            <span class="detail-value">${payout.user?.bankDetails?.accountNumber || 'N/A'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Bank Name:</span>
                            <span class="detail-value">${payout.user?.bankDetails?.bankName || 'N/A'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">IFSC:</span>
                            <span class="detail-value">${payout.user?.bankDetails?.ifsc || 'N/A'}</span>
                        </div>
                    </div>
                    
                    ${payout.remarks ? `
                        <div class="detail-row">
                            <span class="detail-label">Remarks:</span>
                            <span class="detail-value">${payout.remarks}</span>
                        </div>
                    ` : ''}
                    
                    ${payout.status === 'pending' ? `
                        <div class="modal-actions">
                            <button class="modal-btn approve" onclick="approvePayout('${payout.withdrawalId}')">
                                Approve
                            </button>
                            <button class="modal-btn reject" onclick="showRejectModal('${payout.withdrawalId}')">
                                Reject
                            </button>
                            <button class="modal-btn cancel" onclick="closeModal()">
                                Cancel
                            </button>
                        </div>
                    ` : `
                        <div style="text-align: center; margin-top: 20px;">
                            <button class="modal-btn cancel" onclick="closeModal()">Close</button>
                        </div>
                    `}
                `;
                
                modal.classList.add('active');
                
            } catch (error) {
                console.error('Error loading details:', error);
            }
        }
        
        // Show approve modal
        function showApproveModal(withdrawalId) {
            currentPayout = withdrawalId;
            
            const modal = document.getElementById('payoutModal');
            const content = document.getElementById('modalContent');
            
            content.innerHTML = `
                <div style="text-align: center; padding: 20px;">
                    <i class="fas fa-check-circle" style="font-size: 60px; color: var(--success); margin-bottom: 20px;"></i>
                    <h3 style="margin-bottom: 20px;">Approve Payout Request</h3>
                    <p style="color: var(--gray); margin-bottom: 20px;">Are you sure you want to approve this payout?</p>
                    
                    <div class="form-group">
                        <label class="form-label">Transaction ID (Optional)</label>
                        <input type="text" class="form-control" id="transactionId" placeholder="Enter transaction ID">
                    </div>
                    
                    <div class="modal-actions">
                        <button class="modal-btn cancel" onclick="closeModal()">Cancel</button>
                        <button class="modal-btn approve" onclick="approvePayout()">Confirm Approve</button>
                    </div>
                </div>
            `;
            
            modal.classList.add('active');
        }
        
        // Approve payout
        async function approvePayout() {
            const transactionId = document.getElementById('transactionId')?.value;
            
            try {
                const response = await fetch('/api/admin/withdrawals/process', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        withdrawalId: currentPayout,
                        action: 'approve',
                        transactionId: transactionId
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('Payout approved successfully');
                    closeModal();
                    loadPayouts(currentPage);
                }
            } catch (error) {
                console.error('Error approving payout:', error);
            }
        }
        
        // Show reject modal
        function showRejectModal(withdrawalId) {
            currentPayout = withdrawalId;
            document.getElementById('rejectModal').classList.add('active');
        }
        
        // Confirm reject
        async function confirmReject() {
            const reason = document.getElementById('rejectReason').value;
            
            if (!reason) {
                alert('Please enter rejection reason');
                return;
            }
            
            try {
                const response = await fetch('/api/admin/withdrawals/process', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        withdrawalId: currentPayout,
                        action: 'reject',
                        remarks: reason
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('Payout rejected successfully');
                    closeRejectModal();
                    loadPayouts(currentPage);
                }
            } catch (error) {
                console.error('Error rejecting payout:', error);
            }
        }
        
        // Close modals
        function closeModal() {
            document.getElementById('payoutModal').classList.remove('active');
        }
        
        function closeRejectModal() {
            document.getElementById('rejectModal').classList.remove('active');
            document.getElementById('rejectReason').value = '';
        }
        
        // Toggle select all
        function toggleAll() {
            const checkboxes = document.querySelectorAll('.payout-checkbox');
            const selectAll = document.getElementById('selectAll');
            
            checkboxes.forEach(cb => {
                cb.checked = selectAll.checked;
            });
            
            updateSelected();
        }
        
        // Update selected payouts
        function updateSelected() {
            selectedPayouts = [];
            document.querySelectorAll('.payout-checkbox:checked').forEach(cb => {
                selectedPayouts.push(cb.value);
            });
        }
        
        // Bulk process
        function processBulk() {
            if (selectedPayouts.length === 0) {
                alert('Please select at least one payout');
                return;
            }
            
            // Show bulk action modal
        }
        
        // Export payouts
        function exportPayouts() {
            window.location.href = '/api/admin/withdrawals/export';
        }
        
        // View bank details
        async function viewBankDetails(userId) {
            try {
                const response = await fetch(`/api/admin/user/${userId}/bank`);
                const data = await response.json();
                
                alert(`
                    Bank Details:
                    Account Name: ${data.accountName}
                    Account No: ${data.accountNumber}
                    Bank: ${data.bankName}
                    IFSC: ${data.ifsc}
                `);
            } catch (error) {
                console.error('Error fetching bank details:', error);
            }
        }
        
        // Logout
        async function logout() {
            if (confirm('Are you sure you want to logout?')) {
                await fetch('/api/logout', { method: 'POST' });
                window.location.href = '/admin-login';
            }
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            if (await checkAuth()) {
                loadPayouts();
                
                // Set default dates
                const today = new Date();
                const thirtyDaysAgo = new Date(today.setDate(today.getDate() - 30));
                document.getElementById('fromDate').valueAsDate = thirtyDaysAgo;
                document.getElementById('toDate').valueAsDate = new Date();
            }
        });
    </script>
</body>
</html>
